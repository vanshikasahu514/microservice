name: Microservices CI/CD Pipeline

on:
  push:
    branches: [ main ]       # main pe push hone par
  pull_request:
    branches: [ main ]       # PR aane par

jobs:

  # ─── JOB 1: Contract Tests ─────────────────────────
  contract-tests:
    name: Run Contract Tests
    runs-on: ubuntu-latest   # GitHub ka free Linux machine

    steps:
      - name: Code checkout karo
        uses: actions/checkout@v4

      - name: Python setup karo
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Dependencies install karo
        run: |
          pip install pytest requests django djangorestframework djangorestframework-simplejwt

      - name: User Service start karo (background mein)
        run: |
          cd user_service/config
          pip install -r requirements.txt
          python manage.py migrate --run-syncdb
          python manage.py runserver 8001 &
          sleep 5  # server start hone ka wait
        env:
          DJANGO_SETTINGS_MODULE: config.settings

      - name: Contract tests chalao
        run: |
          pytest tests/test_contract.py -v --tb=short
        env:
          USER_SERVICE_URL: http://localhost:8001

  # ─── JOB 2: Docker Build ───────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: contract-tests      # pehle tests pass hone chahiye!

    steps:
      - name: Code checkout karo
        uses: actions/checkout@v4

      - name: Docker setup karo
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login karo
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}   # GitHub secrets se
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Gateway image build aur push karo
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/microservices-gateway:latest

      - name: User Service image build aur push karo
        uses: docker/build-push-action@v5
        with:
          context: ./user_service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/microservices-user:latest

      - name: Product Service image build aur push karo
        uses: docker/build-push-action@v5
        with:
          context: ./product_service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/microservices-product:latest

  # ─── JOB 3: Notify ─────────────────────────────────
  notify:
    name: Pipeline Result
    runs-on: ubuntu-latest
    needs: [contract-tests, docker-build]
    if: always()    # success ya fail dono pe chalega

    steps:
      - name: Success message
        if: ${{ needs.docker-build.result == 'success' }}
        run: echo "Pipeline SUCCESS! Images pushed to Docker Hub"

      - name: Failure message
        if: ${{ needs.docker-build.result == 'failure' }}
        run: echo "Pipeline FAILED! Check logs above"